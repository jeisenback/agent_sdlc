name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  run-pr-review:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi

      - name: Create PR diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1 || true
          git fetch origin ${{ github.event.pull_request.head.ref }} --depth=1 || true
          git diff origin/${{ github.event.pull_request.base.ref }}...origin/${{ github.event.pull_request.head.ref }} > pr.diff || git diff ${GITHUB_SHA} > pr.diff || true

      - name: Run PR review agent
        run: |
          PYTHONPATH="${PYTHONPATH}:${GITHUB_WORKSPACE}" python scripts/pr_review_runner.py --title "${{ github.event.pull_request.title }}" --diff-file pr.diff --pr-number ${{ github.event.number }} --out pr_review_findings.md

      - name: Post findings as PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.number }}
          body-file: pr_review_findings.md
