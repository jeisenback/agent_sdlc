[tool.poetry]
name = "{{project_name}}"
version = "0.1.0"
description = "An agent-assisted SDLC project generated from agent_sdlc template."
authors = ["{{author}} <{{author_email}}>"]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
agent-sdlc = {path = "..", develop = true}

[tool.poetry.dev-dependencies]
pytest = "^7.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
